<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>MD2PDF</title>
  <link rel="stylesheet" href="../../assets/styles/app.css">
  <link rel="stylesheet" href="../../assets/styles/preview.css">
  <link id="theme-link" rel="stylesheet" href="../../assets/styles/themes/light.css">
</head>
<body>
  <div id="toolbar">
    <span id="file-name">Nowy dokument</span>
    <span id="modified-indicator" class="hidden">●</span>
    <div id="toolbar-actions">
      <button id="btn-open" title="Otwórz (Ctrl+O)">📂 Otwórz</button>
      <button id="btn-save" title="Zapisz (Ctrl+S)">💾 Zapisz</button>
      <button id="btn-export" title="Eksport PDF (Ctrl+E)">📄 PDF</button>
      <button id="btn-theme" title="Przełącz motyw (Ctrl+T)">🌓 Motyw</button>
    </div>
  </div>
  <div id="main-container">
    <div id="editor-pane"></div>
    <div id="splitter"></div>
    <div id="preview-pane">
      <div id="preview-content"></div>
    </div>
  </div>
  <div id="status-bar">
    <span id="status-message">Gotowy</span>
    <span id="cursor-position">Ln 1, Col 1</span>
  </div>
  <script src="../../dist/renderer/renderer.js"></script>
</body>
</html>
